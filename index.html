<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>大阪ドローンマップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

.locate-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
}

</style>
</head>
<body>

<div id="map"></div>
<div class="locate-btn" onclick="goLocation()">現在地</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 判定用ライブラリ -->
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>

// 地図
var map = L.map('map').setView([34.6937, 135.5023], 11);

// タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DIDデータ
var didLayer;

fetch('oosaka.geojson')
.then(res => res.json())
.then(data => {

    didLayer = data;

    L.geoJSON(data, {
        style: {
            color: "red",
            fillColor: "red",
            fillOpacity: 0.4
        }
    }).addTo(map);
});

// 現在地
function goLocation(){
    map.locate({ setView: true, maxZoom: 16 });
}

map.on('locationfound', function(e) {
    L.marker(e.latlng).addTo(map)
        .bindPopup("現在地")
        .openPopup();

    L.circle(e.latlng, {
        radius: e.accuracy
    }).addTo(map);
});

map.on('locationerror', function(e) {
    alert("位置情報が取得できません");
});

// クリック判定
map.on('click', function(e) {

    if (!didLayer) {
        alert("データ読み込み中");
        return;
    }

    var point = turf.point([e.latlng.lng, e.latlng.lat]);

    var inside = false;

    didLayer.features.forEach(function(feature) {
        if (turf.booleanPointInPolygon(point, feature)) {
            inside = true;
        }
    });

    if (inside) {
        alert("ここは飛行NG（DID内）");
    } else {
        alert("ここは飛行OK（DID外）");
    }

});

</script>

</body>
</html>
