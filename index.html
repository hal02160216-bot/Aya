<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Drone Map Osaka</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* 地図 */
#map {
    height: 100vh;
}

/* ＝＝＝＝＝＝＝＝＝＝＝＝＝＝
   ガラスボタン
＝＝＝＝＝＝＝＝＝＝＝＝＝＝ */
#infoBtn {
    position: absolute;
    bottom: 22px;
    right: 22px;
    width: 48px;
    height: 48px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    color: #333;

    cursor: pointer;
    z-index: 1000;

    box-shadow: 0 6px 18px rgba(0,0,0,0.15);

    transition: 0.2s;
}

#infoBtn:hover {
    transform: translateY(-2px) scale(1.05);
}

/* 現在地ボタン */
#locateBtn {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 1000;

    padding: 8px 12px;
    border-radius: 10px;

    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);

    border: 1px solid rgba(0,0,0,0.1);
    cursor: pointer;
}

/* ＝＝＝＝＝＝＝＝＝＝＝＝＝＝
   モーダル（ガラス）
＝＝＝＝＝＝＝＝＝＝＝＝＝＝ */
#modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: none;
    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(6px);

    z-index: 2000;
}

#modalContent {
    width: 85%;
    max-width: 420px;

    padding: 20px;
    border-radius: 16px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(0,0,0,0.08);

    box-shadow: 0 10px 30px rgba(0,0,0,0.25);

    animation: pop 0.18s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

#modalContent button {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.08);
    cursor: pointer;
}

</style>
</head>
<body>

<div id="map"></div>

<div id="locateBtn">現在地</div>
<div id="infoBtn">ⓘ</div>

<!-- モーダル -->
<div id="modal">
  <div id="modalContent">
    <h3>免責・出典</h3>

    <p>
      【免責事項】<br>
      本マップは参考情報です。<br>
      最終判断はDIPS・航空法等の公式情報をご確認ください。
    </p>

    <p>
      【出典】<br>
      ・国土地理院<br>
      ・国土交通省 航空局<br>
      ・国勢調査DIDデータ
    </p>

    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>

// 地図
var map = L.map('map').setView([34.6937, 135.5023], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// DIDデータ
var didLayer;
var lastMarker;

// 読み込み
fetch('oosaka.geojson')
.then(res => res.json())
.then(data => {

    didLayer = data;

    L.geoJSON(data, {
        style: {
            color: "red",
            weight: 1,
            fillOpacity: 0
        }
    }).addTo(map);
});

// ＝＝＝＝＝＝＝＝＝＝＝
// 現在地
// ＝＝＝＝＝＝＝＝＝＝＝
document.getElementById("locateBtn").onclick = function(){
    map.locate({ setView: true, maxZoom: 16 });
};

map.on('locationfound', function(e){
    L.marker(e.latlng).addTo(map)
        .bindPopup("現在地")
        .openPopup();
});

// ＝＝＝＝＝＝＝＝＝＝＝
// クリック判定
// ＝＝＝＝＝＝＝＝＝＝＝
map.on('click', function(e){

    if(!didLayer) return;

    if(lastMarker) map.removeLayer(lastMarker);

    var point = turf.point([e.latlng.lng, e.latlng.lat]);

    var inside = false;

    didLayer.features.forEach(f => {
        if(turf.booleanPointInPolygon(point, f)){
            inside = true;
        }
    });

    var color = inside ? "red" : "green";
    var text = inside
        ? "飛行NG（人口集中地区）"
        : "飛行OK（DID外）";

    lastMarker = L.circleMarker(e.latlng, {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.8
    }).addTo(map)
      .bindPopup(text)
      .openPopup();
});

// ＝＝＝＝＝＝＝＝＝＝＝
// モーダル
// ＝＝＝＝＝＝＝＝＝＝＝
document.getElementById("infoBtn").onclick = function(){
    document.getElementById("modal").style.display = "flex";
};

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
